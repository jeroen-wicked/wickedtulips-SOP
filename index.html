<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wicked Tulips — Team SOPs</title>
  <style>
    :root {
      --bg: #fdf6f0;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #777;
      --radius: 14px;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Lock screen */
    .lock-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #b5203b, #d4364f);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
    }
    .lock-screen .lock-logo { font-size: 2.8rem; margin-bottom: 8px; }
    .lock-screen h1 { color: white; font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .lock-screen p { color: rgba(255,255,255,0.8); font-size: 0.85rem; margin-bottom: 28px; }
    .lock-screen input {
      width: 100%; max-width: 320px; padding: 14px 16px;
      border: none; border-radius: 12px; font-size: 1rem;
      text-align: center; letter-spacing: 0.05em;
      margin-bottom: 12px; outline: none;
    }
    .lock-screen button {
      width: 100%; max-width: 320px; padding: 14px;
      background: white; color: #b5203b;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .lock-screen .lock-error {
      color: rgba(255,255,255,0.9); font-size: 0.85rem;
      margin-top: 10px; display: none;
    }
    .hidden { display: none !important; }

    header {
      background: linear-gradient(135deg, #b5203b, #d4364f);
      color: white;
      padding: 18px 20px 14px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(181,32,59,0.3);
    }
    header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
    header p { font-size: 0.82rem; opacity: 0.85; margin-top: 3px; }

    main { padding: 16px; max-width: 640px; margin: 0 auto; }
    @media (min-width: 900px) { main { max-width: 960px; } }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 1rem; }
    .search-bar {
      width: 100%; padding: 11px 14px 11px 36px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: 0.9rem; background: white;
      transition: border-color 0.15s;
    }
    .search-bar:focus { outline: none; border-color: #b5203b; }

    /* Team grid */
    .team-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }
    @media (min-width: 480px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 700px) { .team-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 900px) { .team-grid { grid-template-columns: repeat(5, 1fr); } }

    .team-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 12px 14px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: var(--shadow);
      transition: transform 0.12s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .team-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
    .team-card:active { transform: scale(0.96); }
    .team-card .card-icon { font-size: 2.2rem; display: block; margin-bottom: 8px; }
    .team-card .card-name { font-size: 0.82rem; font-weight: 700; line-height: 1.25; }
    .team-card .card-count { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; }

    /* Detail view */
    .hidden { display: none !important; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: none; border: none;
      color: #b5203b; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; padding: 8px 0; margin-bottom: 14px;
      -webkit-tap-highlight-color: transparent;
    }

    .team-header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px; border-radius: var(--radius);
      color: white; margin-bottom: 14px;
    }
    .team-header .th-icon { font-size: 2.6rem; flex-shrink: 0; }
    .team-header h2 { font-size: 1.3rem; font-weight: 800; }
    .team-header p { font-size: 0.82rem; opacity: 0.88; margin-top: 2px; line-height: 1.4; }

    /* Steps */
    .step {
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1.5px solid #f0f0f0;
    }
    .step-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .step-number {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.88rem; color: white; flex-shrink: 0;
    }
    .step-title { font-weight: 600; font-size: 0.95rem; flex: 1; line-height: 1.3; }
    .step-chevron { color: #bbb; font-size: 0.75rem; transition: transform 0.2s; flex-shrink: 0; }
    .step.open .step-chevron { transform: rotate(180deg); }

    .step-body { display: none; padding: 2px 16px 16px 62px; }
    @media (max-width: 400px) { .step-body { padding-left: 16px; } }
    .step.open .step-body { display: block; }

    .step-description {
      font-size: 0.9rem; line-height: 1.65; color: #333;
      white-space: pre-line; margin-bottom: 10px;
    }
    .step-image {
      width: 100%; border-radius: 10px; margin-bottom: 12px;
      display: block; object-fit: cover; max-height: 260px;
    }

    .tips {
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      border-radius: 0 8px 8px 0;
      padding: 10px 13px; margin-top: 10px;
    }
    .tips-title {
      font-size: 0.72rem; font-weight: 800; color: #92400e;
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px;
    }
    .tips ul { list-style: none; }
    .tips li {
      font-size: 0.85rem; color: #78350f;
      padding: 2px 0 2px 16px; position: relative; line-height: 1.5;
    }
    .tips li::before { content: "→"; position: absolute; left: 0; color: #f59e0b; }

    .last-updated {
      text-align: center; font-size: 0.75rem; color: var(--text-muted);
      margin-top: 28px; padding-bottom: 32px;
    }
  </style>
</head>
<body>

</main>

// Password gate
function unlock() {
  if (document.getElementById('pwInput').value === 'teamtulip2026') {
    sessionStorage.setItem('wt_unlocked', '1');
    document.getElementById('lockScreen').classList.add('hidden');
  } else {
    document.getElementById('lockError').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}
if (sessionStorage.getItem('wt_unlocked') === '1') {
  document.getElementById('lockScreen').classList.add('hidden');
}

let currentTeam = null;

function renderGrid() {
  document.getElementById('teamGrid').innerHTML = CONFIG.teams.map(t => `
    <div class="team-card" onclick="showTeam('${t.id}')" style="border-color:${t.color}30">
      <span class="card-icon">${t.icon}</span>
      <div class="card-name">${t.name}</div>
      <div class="card-count">${t.steps.length} steps</div>
    </div>
  `).join('');
  document.getElementById('lastUpdated').textContent = `Last updated: ${CONFIG.lastUpdated}`;
}

function filterTeams() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.team-card').forEach((card, i) => {
    const t = CONFIG.teams[i];
    const hit = !q
      || t.name.toLowerCase().includes(q)
      || t.steps.some(s =>
          s.title.toLowerCase().includes(q) ||
          (s.description || '').toLowerCase().includes(q) ||
          (s.tips || []).some(tip => tip.toLowerCase().includes(q))
        );
    card.style.display = hit ? '' : 'none';
  });
}

function showTeam(id) {
  currentTeam = CONFIG.teams.find(t => t.id === id);
  if (!currentTeam) return;

  document.getElementById('teamContent').innerHTML = `
    <div class="team-header" style="background:linear-gradient(135deg,${currentTeam.color},${currentTeam.color}cc)">
      <span class="th-icon">${currentTeam.icon}</span>
      <div>
        <h2>${currentTeam.name}</h2>
        <p>${currentTeam.tagline}</p>
      </div>
    </div>
    ${currentTeam.steps.map((s, i) => `
      <div class="step" id="s${i}">
        <div class="step-header" onclick="toggle(${i})">
          <div class="step-number" style="background:${currentTeam.color}">${i + 1}</div>
          <div class="step-title">${s.title}</div>
          <span class="step-chevron">▼</span>
        </div>
        <div class="step-body">
          <p class="step-description">${(s.description || '').replace(/\n/g, '<br>')}</p>
          ${s.image ? `<img class="step-image" src="${s.image}" alt="${s.title}" loading="lazy">` : ''}
          ${s.tips && s.tips.length ? `
            <div class="tips">
              <div class="tips-title">💡 Tips</div>
              <ul>${s.tips.map(t => `<li>${t}</li>`).join('')}</ul>
            </div>` : ''}
        </div>
      </div>`).join('')}
  `;

  document.getElementById('gridView').classList.add('hidden');
  document.getElementById('detailView').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function showGrid() {
  document.getElementById('gridView').classList.remove('hidden');
  document.getElementById('detailView').classList.add('hidden');
  window.scrollTo(0, 0);
}

function toggle(i) {
  document.getElementById('s' + i).classList.toggle('open');
}

renderGrid();
</script>
